name: iOS Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-tests:
    name: Build and test
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run verifier
        run: ./scripts/verify-s04-tests-and-failure-states.sh
